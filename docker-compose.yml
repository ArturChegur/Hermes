services:
    postgres:
        image: postgres:17-alpine
        container_name: hermes-postgres
        environment:
            POSTGRES_DB: hermes
            POSTGRES_USER: hermes
            POSTGRES_PASSWORD: hermes
        ports:
            - "5433:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U hermes -d hermes" ]
            interval: 5s
            timeout: 3s
            retries: 20
        volumes:
            - postgres_data:/var/lib/postgresql/data

    kafka:
        image: confluentinc/cp-kafka:7.6.1
        container_name: hermes-kafka
        environment:
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
            - "9092:9092"
        healthcheck:
            test: [ "CMD-SHELL", "bash -ec 'echo > /dev/tcp/localhost/9092'" ]
            interval: 10s
            timeout: 5s
            retries: 20
        restart: unless-stopped

    ollama:
        image: ollama/ollama:latest
        container_name: hermes-ollama
        restart: unless-stopped
        environment:
            OLLAMA_HOST: 0.0.0.0:11434
        ports:
            - "127.0.0.1:11434:11434"
        volumes:
            - ollama_data:/root/.ollama
        healthcheck:
            test: [ "CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1" ]
            interval: 10s
            timeout: 5s
            retries: 30

    ollama-init:
        image: ollama/ollama:latest
        container_name: hermes-ollama-init
        depends_on:
            ollama:
                condition: service_healthy
        environment:
            OLLAMA_HOST: http://ollama:11434
        volumes:
            - ./ollama:/modelfiles
            - ollama_data:/root/.ollama
        entrypoint: [ "/bin/sh", "-lc", "ollama pull qwen2.5:7b-instruct && ollama create qwen-rus-roast -f /modelfiles/Modelfile && echo \"Model qwen-rus-roast created\"" ]
        restart: "no"

    hermes-ingestor:
        container_name: hermes-ingestor
        build:
            context: .
            dockerfile: hermes-ingestor/Dockerfile
        env_file:
            - .env
        depends_on:
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy
            hermes-analytics:
                condition: service_healthy
            ollama-init:
                condition: service_completed_successfully
        ports:
            - "8081:8081"
        environment:
            DB_URL: ${DB_URL}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            UPDATES_KAFKA_TOPIC: ${UPDATES_KAFKA_TOPIC}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
            HOST_BASE_URL: ${HOST_BASE_URL}
            LINK_TTL_MINUTES: ${LINK_TTL_MINUTES:-60}
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
            OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen-rus-roast}
            JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
        restart: unless-stopped

    hermes-analytics:
        container_name: hermes-analytics
        build:
            context: .
            dockerfile: hermes-analytics/Dockerfile
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            kafka:
                condition: service_healthy
        ports:
            - "8082:8082"
        environment:
            DB_URL: ${DB_URL}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            UPDATES_KAFKA_TOPIC: ${UPDATES_KAFKA_TOPIC}
            CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID}
            DLQ_KAFKA_TOPIC: ${DLQ_KAFKA_TOPIC}
            KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
        healthcheck:
            test: [ "CMD-SHELL", "kill -0 1" ]
            interval: 10s
            timeout: 5s
            retries: 20
        restart: unless-stopped

    hermes-frontend:
        container_name: hermes-frontend
        build:
            context: .
            dockerfile: hermes-frontend/Dockerfile
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            hermes-analytics:
                condition: service_healthy
        ports:
            - "8080:8080"
        environment:
            DB_URL: ${DB_URL}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
        restart: unless-stopped

volumes:
    postgres_data:
    ollama_data: